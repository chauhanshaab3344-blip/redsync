<!DOCTYPE html>
<html>
<head>
  <title>❤️ RedSync Ultimate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#1a0000;
      color:white;
      text-align:center;
    }
    .box{
      margin-top:60px;
    }
    input{
      padding:10px;
      margin:10px;
      width:250px;
      border-radius:6px;
      border:none;
    }
    button{
      padding:10px 20px;
      margin:5px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
    }
    .primary{ background:#8b0000; color:white; }
    .logout{ background:black; color:white; }
  </style>
</head>

<body>

  <div class="box" id="authBox">
    <h1>❤️ RedSync Authentication</h1>

    <input type="email" id="email" placeholder="Enter Email"><br>
    <input type="password" id="password" placeholder="Enter Password"><br>

    <button class="primary" id="signup">Sign Up</button>
    <button class="primary" id="login">Login</button>
  </div>

  <div class="box" id="homeBox" style="display:none;">
    <h1>🔥 Welcome to RedSync</h1>
    <p id="userEmail"></p>
    <button class="logout" id="logout">Logout</button>
  </div>

<script type="module">

// 🔥 Firebase Imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔥 YOUR Firebase Config (Applied)
const firebaseConfig = {
  apiKey: "AIzaSyD-M1qJ4NDkb9_CTNjCg9afEj-VyD1Nugs",
  authDomain: "red-sync-2f00e.firebaseapp.com",
  projectId: "red-sync-2f00e",
  storageBucket: "red-sync-2f00e.firebasestorage.app",
  messagingSenderId: "449210595883",
  appId: "1:449210595883:web:866765e6211dd21790086e"
};

// Initialize
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Elements
const email = document.getElementById("email");
const password = document.getElementById("password");
const signupBtn = document.getElementById("signup");
const loginBtn = document.getElementById("login");
const logoutBtn = document.getElementById("logout");

const authBox = document.getElementById("authBox");
const homeBox = document.getElementById("homeBox");
const userEmail = document.getElementById("userEmail");

// 🔥 Sign Up
signupBtn.addEventListener("click", async () => {
  try {
    await createUserWithEmailAndPassword(auth, email.value, password.value);
    alert("Account Created ✅");
  } catch (error) {
    alert(error.message);
  }
});

// 🔥 Login
loginBtn.addEventListener("click", async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
    alert("Login Successful 🔥");
  } catch (error) {
    alert(error.message);
  }
});

// 🔥 Logout
logoutBtn.addEventListener("click", async () => {
  await signOut(auth);
});

// 🔥 Detect Login State
onAuthStateChanged(auth, (user) => {
  if (user) {
    authBox.style.display = "none";
    homeBox.style.display = "block";
    userEmail.innerText = "Logged in as: " + user.email;
  } else {
    authBox.style.display = "block";
    homeBox.style.display = "none";
  }
});

</script>

</body>
</html>
