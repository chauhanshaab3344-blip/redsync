<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RedSync Ultimate</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#1a0000,#330000);
  color:white;
}
header{
  background:#8b0000;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}
.container{padding:20px;}
.card{
  background:rgba(255,0,0,0.08);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,0,0,0.3);
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow:0 0 25px rgba(255,0,0,0.4);
}
button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#cc0000;
  color:white;
  cursor:pointer;
  margin:5px 0;
}
input{
  padding:10px;
  border-radius:8px;
  border:none;
  margin:5px 0;
}
video{
  width:48%;
  background:black;
  border-radius:10px;
}
.video-area{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.chat-box{
  height:180px;
  overflow-y:auto;
  background:black;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}
.status{
  font-size:14px;
  color:#ff8080;
}
@media(max-width:768px){
  video{width:100%;}
}
</style>
</head>

<body>
<header>❤️ RedSync ULTIMATE</header>
<div class="container">

<div class="card">
<h3>🏠 Room</h3>
<button onclick="createRoom()">Create Room</button><br>
<input id="roomInput" placeholder="Enter PIN">
<button onclick="joinRoom()">Join Room</button>
<p id="roomStatus"></p>
<p class="status" id="userCount"></p>
</div>

<div class="card">
<h3>🎥 Video / Screen</h3>
<div class="video-area">
<video id="localVideo" autoplay playsinline muted></video>
<video id="remoteVideo" autoplay playsinline></video>
</div>
<button onclick="startCamera()">Start Camera</button>
<button onclick="shareScreen()">Share Screen</button>
<button onclick="voiceOnly()">Voice Only</button>
</div>

<div class="card">
<h3>💬 Chat</h3>
<div class="chat-box" id="chatBox"></div>
<input id="chatInput" placeholder="Type message" oninput="typingStatus()">
<button onclick="sendMessage()">Send</button>
<p class="status" id="typingIndicator"></p>
</div>

<div class="card">
<h3>🎬 Watch Together</h3>
<video id="moviePlayer" controls></video>
<input type="file" accept="video/*" onchange="loadMovie(event)">
</div>

</div>

<script>
// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyD-M1qJ4NDkb9_CTNjCg9afEj-VyD1Nugs",
  authDomain: "red-sync-2f00e.firebaseapp.com",
  projectId: "red-sync-2f00e",
  storageBucket: "red-sync-2f00e.firebasestorage.app",
  messagingSenderId: "449210595883",
  appId: "1:449210595883:web:866765e6211dd21790086e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ========================
// WebRTC with STUN
// ========================
let roomId;
let localStream;
let pc = new RTCPeerConnection({
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" },
    // Optional TURN server (for networks that block P2P)
    // { urls: "turn:TURN_SERVER_URL", username: "USER", credential: "PASS" }
  ]
});

let localVideo = document.getElementById("localVideo");
let remoteVideo = document.getElementById("remoteVideo");

// Chat
const chatBox = document.getElementById("chatBox");
const chatInput = document.getElementById("chatInput");
const typingIndicator = document.getElementById("typingIndicator");
const userCount = document.getElementById("userCount");

// ========================
// Camera / Screen / Voice
// ========================
function startCamera(){
  navigator.mediaDevices.getUserMedia({video:true,audio:true})
  .then(stream=>{
    localStream = stream;
    localVideo.srcObject = stream;
    stream.getTracks().forEach(track=> pc.addTrack(track, stream));
  });
}

function shareScreen(){
  navigator.mediaDevices.getDisplayMedia({video:true})
  .then(stream=>{
    localStream = stream;
    localVideo.srcObject = stream;
    pc.getSenders().forEach(sender=>{
      if(sender.track.kind==="video") sender.replaceTrack(stream.getVideoTracks()[0]);
    });
  });
}

function voiceOnly(){
  navigator.mediaDevices.getUserMedia({audio:true})
  .then(stream=>{
    localStream = stream;
    localVideo.srcObject = null;
    pc.getSenders().forEach(sender=>{
      if(sender.track.kind==="audio") sender.replaceTrack(stream.getAudioTracks()[0]);
    });
  });
}

// ========================
// Create / Join Room
// ========================
async function createRoom(){
  roomId = Math.floor(100000+Math.random()*900000).toString();
  roomInput.value = roomId;
  const roomRef = db.collection("rooms").doc(roomId);
  roomStatus.innerText = "Room Created: " + roomId;

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await roomRef.set({offer: {type: offer.type, sdp: offer.sdp}});

  roomRef.onSnapshot(async snapshot=>{
    const data = snapshot.data();
    if(!pc.currentRemoteDescription && data && data.answer){
      await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
    }
    if(data && data.candidates){
      data.candidates.forEach(async c=>{
        try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch{}
      });
    }
  });

  pc.onicecandidate = e=>{
    if(!e.candidate) return;
    roomRef.update({candidates: firebase.firestore.FieldValue.arrayUnion(e.candidate.toJSON())});
  };
}

async function joinRoom(){
  roomId = roomInput.value;
  const roomRef = db.collection("rooms").doc(roomId);
  const roomData = (await roomRef.get()).data();
  roomStatus.innerText = "Joined Room: " + roomId;

  await pc.setRemoteDescription(new RTCSessionDescription(roomData.offer));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await roomRef.update({answer: {type: answer.type, sdp: answer.sdp}});

  roomRef.onSnapshot(snapshot=>{
    const data = snapshot.data();
    if(data && data.candidates){
      data.candidates.forEach(async c=>{
        try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch{}
      });
    }
  });

  pc.onicecandidate = e=>{
    if(!e.candidate) return;
    roomRef.update({candidates: firebase.firestore.FieldValue.arrayUnion(e.candidate.toJSON())});
  };
}

// ========================
// Remote video
// ========================
pc.ontrack = e=>{
  remoteVideo.srcObject = e.streams[0];
};

// ========================
// Chat
// ========================
function sendMessage(){
  const msg = chatInput.value;
  db.collection("rooms").doc(roomId).collection("chat").add({
    text: msg,
    time: Date.now()
  });
  chatInput.value = "";
}

function listenChat(){
  db.collection("rooms").doc(roomId).collection("chat")
    .orderBy("time")
    .onSnapshot(snapshot=>{
      chatBox.innerHTML = "";
      snapshot.forEach(doc=>{
        chatBox.innerHTML += "<p>"+doc.data().text+"</p>";
      });
    });
}

function typingStatus(){
  db.collection("rooms").doc(roomId).set({typing:true},{merge:true});
}

db.collection("rooms").doc(roomId).onSnapshot(doc=>{
  if(doc.data()?.typing){
    typingIndicator.innerText="Friend is typing...";
    setTimeout(()=>typingIndicator.innerText="",1000);
  }
});

// ========================
// Watch Together
// ========================
const moviePlayer = document.getElementById("moviePlayer");
function loadMovie(e){
  moviePlayer.src = URL.createObjectURL(e.target.files[0]);
}

moviePlayer.onplay = ()=>{
  db.collection("rooms").doc(roomId).set({movie:"play", time:moviePlayer.currentTime},{merge:true});
};
moviePlayer.onpause = ()=>{
  db.collection("rooms").doc(roomId).set({movie:"pause", time:moviePlayer.currentTime},{merge:true});
};

db.collection("rooms").doc(roomId).onSnapshot(doc=>{
  const d = doc.data();
  if(!d) return;
  if(d.movie==="play"){ moviePlayer.currentTime = d.time; moviePlayer.play(); }
  if(d.movie==="pause"){ moviePlayer.currentTime = d.time; moviePlayer.pause(); }
});

// Start chat listener
listenChat();
</script>
</body>
</html>
