<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RedSync Login</title>

  <!-- Firebase compat scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: linear-gradient(135deg,#1a0000,#330000);
      color: white;
    }
    button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: #cc0000;
      color: white;
      cursor: pointer;
      margin: 10px;
    }
    button:hover {
      background: #8b0000;
    }
  </style>
</head>

<body>
  <h1>❤️ RedSync 🔥</h1>
  <h2>Login with Google</h2>
  <button onclick="googleLogin()">Login with Google</button>
  <p id="userInfo"></p>

  <script>
    // 🔥 Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyD-M1qJ4NDkb9_CTNjCg9afEj-VyD1Nugs",
      authDomain: "red-sync-2f00e.firebaseapp.com",
      projectId: "red-sync-2f00e",
      storageBucket: "red-sync-2f00e.firebasestorage.app",
      messagingSenderId: "449210595883",
      appId: "1:449210595883:web:866765e6211dd21790086e"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Google Login
    function googleLogin() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then(result => {
          const user = result.user;
          document.getElementById("userInfo").innerText = "Logged in as: " + user.displayName;
          // Redirect to main website
          window.location.href = "home.html";
        })
        .catch(err => alert(err.message));
    }
  </script>
</body>
</html>
