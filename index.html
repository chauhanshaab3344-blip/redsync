<!DOCTYPE html>
<html>
<head>
<title>Sorry Pihu</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    text-align:center;
    background: linear-gradient(135deg,#a8edea,#fed6e3);
    overflow:hidden;
}

h1{
    margin-top:90px;
    font-size:40px;
}

#text{
    font-size:22px;
    margin-top:20px;
    padding:20px;
    min-height:60px;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    margin:20px;
}

#yes{
    background:#4CAF50;
    color:white;
}

#no{
    background:#ff4b5c;
    color:white;
    position:absolute;
}

.heart,.choco{
    position:fixed;
    bottom:-20px;
    animation: float 5s linear infinite;
}

@keyframes float{
    0%{transform:translateY(0);opacity:1;}
    100%{transform:translateY(-110vh);opacity:0;}
}

#puppy{
    display:none;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>Hey Pihu 🙂</h1>

<p id="text"></p>

<img id="puppy" src="https://media.giphy.com/media/26BRv0ThflsHCqDrG/giphy.gif" width="200">

<div>
<button id="yes" onclick="forgive()">It's okay 👍</button>
<button id="no">No 😒</button>
</div>

<script>

let message = "If 'sorry' could come with chocolates and a puppy, I’d send both right now 🐶🍫 But for now… I’m really really sorry.";

let i=0;

function typing(){
    if(i < message.length){
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typing,40);
    } else {
        document.getElementById("puppy").style.display="block";
    }
}

typing();

function forgive(){

document.body.innerHTML = "<h1 style='margin-top:150px'>Thanks Pihu 🙂</h1><p>You just made my day better!</p>";

for(let i=0;i<150;i++){
let conf=document.createElement("div");
conf.innerHTML="🎉";
conf.style.position="fixed";
conf.style.left=Math.random()*100+"vw";
conf.style.top=Math.random()*100+"vh";
conf.style.fontSize="25px";
document.body.appendChild(conf);
}

}

let noBtn=document.getElementById("no");

noBtn.addEventListener("mouseover",function(){
let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight;

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";
});

function createHeart(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(15+Math.random()*20)+"px";
heart.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(heart);
setTimeout(()=>{heart.remove();},5000);
}

function createChocolate(){
let choco=document.createElement("div");
choco.className="choco";
choco.innerHTML="🍫";
choco.style.left=Math.random()*100+"vw";
choco.style.fontSize="20px";
choco.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(choco);
setTimeout(()=>{choco.remove();},5000);
}

setInterval(createHeart,400);
setInterval(createChocolate,800);

</script>

</body>
</html>
